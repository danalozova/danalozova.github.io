    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        /* --- BĀZES STILI --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Nunito', sans-serif; /* NOMAINĪTS FONTS */
            background: #fff; 
            color: #111; 
            overflow-x: hidden; 
        }
        
        /* --- NAVIGĀCIJA --- */
        nav { 
            position: sticky; top: 0; width: 100%; padding: 20px 80px; 
            display: flex; justify-content: space-between; align-items: center; 
            background: #fff; z-index: 1000; 
        }
        .logo { font-weight: 700; color: rgb(0, 102, 255); text-transform: uppercase; letter-spacing: 2px; font-size: 16px; text-decoration: none; }
        .nav-left a { text-decoration: none; color: #111; margin-right: 35px; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; font-weight: 500; }
        .nav-right a { font-size: 20px; color: rgb(0, 102, 255); margin-left: 20px; text-decoration: none; }

        /* --- HERO SEKCIJA --- */
        .hero { height: 75vh; width: 100%; position: relative; overflow: hidden; background: #000; z-index: 1; }
        .hero video { width: 100%; height: 100%; object-fit: cover; }
        
        /* SVG OVERLAY - FONS.SVG */
        .header-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('images/fons.svg'); 
            background-size: cover; background-position: center;
            z-index: 2; pointer-events: none; mix-blend-mode: screen; opacity: 0.8;
        }

        /* FILTRI */
        .filter-container { text-align: center; padding: 60px 0 40px; }
        .filter-btn { 
            font-family: 'Nunito', sans-serif;
            background: none; border: none; padding: 10px 25px; cursor: pointer; 
            font-size: 12px; text-transform: uppercase; letter-spacing: 2px; 
            color: #111; opacity: 0.5; transition: 0.3s; font-weight: 600;
        }
        .filter-btn.active { opacity: 1; color: rgb(0, 102, 255); font-weight: 700; }

        /* GALERIJA */
        .gallery-section { padding: 0 40px 100px; }
        .gallery-grid { column-count: 4; column-gap: 15px; max-width: 2400px; margin: 0 auto; }
        
        .gallery-item { 
            display: inline-block; 
            width: 100%; 
            margin-bottom: 15px; 
            break-inside: avoid; 
            position: relative; 
            cursor: pointer;
        }
        
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; background: #000; pointer-events: none; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        .gallery-item img { width: 100%; height: auto; display: block; }

        /* MODĀLAIS LOGS */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.98); z-index: 2000; display: none; overflow-y: auto; }
        .modal-content { max-width: 1400px; margin: 100px auto; padding: 0 50px; display: grid; grid-template-columns: 1.5fr 1fr; gap: 60px; }
        .modal-media img { width: 100%; height: auto; display: block; border-radius: 4px; }
        .modal-info h2 { font-size: 38px; color: rgb(0, 102, 255); text-transform: uppercase; margin-bottom: 20px; font-weight: 700; }
        .modal-info .description { font-size: 17px; line-height: 1.6; color: #444; margin-bottom: 40px; }
        .info-grid { border-top: 1px solid #eee; padding-top: 30px; }
        .info-label { font-size: 11px; text-transform: uppercase; color: #aaa; letter-spacing: 1px; display: block; margin-bottom: 5px; font-weight: 700; }
        .info-value { font-size: 16px; color: #111; }
        .close-modal { position: fixed; top: 30px; right: 50px; font-size: 45px; cursor: pointer; color: #111; z-index: 2100; }

        /* RESPONSIBA */
        @media (max-width: 1200px) { .gallery-grid { column-count: 3; } }
        @media (max-width: 900px) { 
            .modal-content { grid-template-columns: 1fr; margin-top: 60px; } 
            .gallery-grid { column-count: 2; }
            nav { padding: 20px 30px; }
        }
        @media (max-width: 600px) { .gallery-grid { column-count: 1; } }
    </style>
</head>

<div id="workModal" class="modal">
    <span class="close-modal" onclick="closeModal()">&times;</span>
    <div class="modal-content">
        <div class="modal-media" id="modalMedia"></div>
        <div class="modal-info">
            <h2 id="modalTitle"></h2>
            <div class="description" id="modalDesc"></div>
            <div class="info-grid">
                <span class="info-label">Papildu informācija</span>
                <div class="info-value" id="modalExtra"></div>
            </div>
        </div>
    </div>

<script>
    function filterGallery(category, btn) {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.gallery-item').forEach(item => {
            if (category === 'all' || item.classList.contains(category)) {
                item.style.display = 'inline-block';
            } else {
                item.style.display = 'none';
            }
        });
    }

    function openModal(type, source, title, desc, extra) {
        const modal = document.getElementById('workModal');
        const media = document.getElementById('modalMedia');
        document.getElementById('modalTitle').innerText = title || "";
        document.getElementById('modalDesc').innerText = desc || "";
        document.getElementById('modalExtra').innerHTML = extra || "";

        if (type === 'video') {
            media.innerHTML = `<div style="position:relative;padding-bottom:56.25%;height:0;background:#000;">
                <iframe src="https://www.youtube.com/embed/${source}?autoplay=1&rel=0" style="position:absolute;top:0;left:0;width:100%;height:100%;border:0;" allowfullscreen allow="autoplay"></iframe>
            </div>`;
        } else {
            media.innerHTML = `<img src="${source}">`;
        }
        modal.style.display = 'block';
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        document.getElementById('workModal').style.display = 'none';
        document.getElementById('modalMedia').innerHTML = '';
        document.body.style.overflow = 'auto';
    }

    window.onclick = function(event) {
        if (event.target == document.getElementById('workModal')) {
            closeModal();
        }
    }
</script>
