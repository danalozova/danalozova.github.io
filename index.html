<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dana Lozova</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', sans-serif;
    background: #f4f4f4;
    color: #111;
}

/* NAVIGATION */

nav {
    position: fixed;
    top: 0;
    width: 100%;
    padding: 20px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(10px);
    z-index: 1000;
}

.nav-left a,
.nav-right a {
    text-decoration: none;
    color: #111;
    margin-right: 20px;
    font-weight: 400;
}

.logo {
    font-weight: 500;
    color: rgb(0, 102, 255);
}

/* HERO VIDEO */

.hero {
    height: 90vh;
    width: 100%;
    overflow: hidden;
    position: relative;
}

.hero video {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* GALERIJA */

.gallery-section {
    padding: 100px 60px;
}

.gallery-title {
    text-align: center;
    margin-bottom: 60px;
    font-size: 22px;
    font-weight: 400;
}

.gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 30px;
}

.gallery-item {
    position: relative;
    overflow: hidden;
    cursor: pointer;
}

.gallery-item img {
    width: 100%;
    display: block;
    transition: transform 0.4s ease;
}

/* HOVER OVERLAY */

.overlay {
    position: absolute;
    inset: 0;
    background: rgba(0, 102, 255, 0.6);
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    font-size: 18px;
    opacity: 0;
    transition: opacity 0.3s ease;
}

.gallery-item:hover img {
    transform: scale(1.05);
}

.gallery-item:hover .overlay {
    opacity: 1;
}

</style>
</head>
<body>

<nav>
    <div class="nav-left">
        <a href="#">Par mani</a>
        <a href="#">Kontakti</a>
    </div>

    <div class="logo">Dana Lozova</div>

    <div class="nav-right">
        <a href="#">YT</a>
        <a href="#">IG</a>
        <a href="#">Mail</a>
    </div>
</nav>

<section class="hero">
    <video autoplay muted loop>
        <source src="https://www.w3schools.com/howto/rain.mp4" type="video/mp4">
    </video>
</section>

<section class="gallery-section">
    <div class="gallery-title">Galerija</div>

    <div class="gallery-grid">

        <a href="project1.html" class="gallery-item">
            <img src="https://picsum.photos/600/400?random=1">
            <div class="overlay">Darbs 01</div>
        </a>

        <a href="project2.html" class="gallery-item">
            <img src="https://picsum.photos/600/400?random=2">
            <div class="overlay">Darbs 02</div>
        </a>

        <a href="project3.html" class="gallery-item">
            <img src="https://picsum.photos/600/400?random=3">
            <div class="overlay">Darbs 03</div>
        </a>

        <a href="project4.html" class="gallery-item">
            <img src="https://picsum.photos/600/400?random=4">
            <div class="overlay">Darbs 04</div>
        </a>

    </div>
</section>

</body>
</html>
